# /etc/rspamd/local.d/multimap.conf
#
# WhoisFreaks NRD Feed — Rspamd multimap rule
#
# Raises the spam score by 5.0 for any email whose sender domain
# appears in the NRD map file. The map file is maintained by
# wf-nrd-fetch.sh and hot-reloaded by Rspamd via inotify — no service
# restart is needed after daily feed updates.
#
# Rspamd's default action thresholds (adjust in /etc/rspamd/local.d/actions.conf):
#   greylist   = 4.0
#   add_header = 6.0
#   reject     = 15.0
#
# With score = 5.0 this rule alone triggers add_header but not reject.
# Combine with other signals (BAYES_SPAM, SPF_FAIL, DKIM issues) for rejection.

WF_NRD_SENDER {
  # "mime" checks the From: header — works for both direct rspamc testing
  # and real SMTP mail delivered via Postfix milter.
  # (extract_from = "smtp" only fires when an SMTP envelope is present,
  #  which rspamc command-line testing does not provide.)
  type         = "from";
  filter       = "email:domain";
  extract_from = "mime";

  # Path to the plain domain list maintained by wf-nrd-fetch.sh
  map          = "/var/lib/rspamd/maps/nrd_domains.map";

  # Spam score added when the sender domain is on the NRD list
  score        = 5.0;

  description  = "Sender domain is newly registered (WhoisFreaks NRD feed)";
}

# ── Optional: hard-reject variant ────────────────────────────────────────────
# Uncomment the block below (and comment out WF_NRD_SENDER above) to reject
# at SMTP time rather than scoring. Only use this after monitoring false
# positives with the score variant for at least two weeks.
#
# WF_NRD_SENDER {
#   type         = "from";
#   filter       = "email:domain";
#   extract_from = "mime";
#   map          = "/var/lib/rspamd/maps/nrd_domains.map";
#   prefilter    = true;
#   action       = "reject";
#   message      = "Rejected: sender domain is newly registered";
# }